name: Branch Protection

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:
  protect:
    name: Enforce Branch Rules
    runs-on: ubuntu-latest
    
    steps:
    - name: Check PR requirements
      run: |
        echo "=== Branch Protection Checks ==="
        echo "✓ PR must target main branch"
        echo "✓ All CI checks must pass"
        echo "✓ At least 1 review required"
        echo "✓ No force pushes allowed"
        echo "✓ No direct commits to main"

    - name: Verify CI status
      run: |
        # This will be enforced via GitHub settings
        echo "CI checks enforced via branch protection rules"
